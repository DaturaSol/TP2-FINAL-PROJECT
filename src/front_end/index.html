<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartMarket</title>
    <link
      rel="icon"
      type="image/png"
      href="src/assets/icons-supermercado-.png"
    />
    <link rel="stylesheet" href="src/styles/style.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">
        <a href="/" style="text-decoration: none; color: inherit;">SmartMarket</a>
      </div>

      <div class="menu">
        <a href="/">Início</a>
        <a href="#">Categorias</a>

        <!-- botões para trocar telas -->
        <a href="/src/login/login.html" id="abrirLogin" class="btn-outline" style="text-decoration: none; padding: 10px 20px; border-radius: 5px;">Entrar</a>
        <a href="/src/cadastro/cadastro.html" id="abrirCadastro" style="text-decoration: none; background-color: var(--primary-color, #ff6b6b); color: white; padding: 10px 20px; border-radius: 5px;">Criar Conta</a>
      </div>
    </nav>

    <section id="home">
      <div class="hero">
        <div class="hero-left">
          <span class="tag"> Compare preços em segundos </span>
          <h1>Compare preços e economize em cada compra</h1>
          <p>
            Organize suas listas de compras, encontre os melhores preços e
            economize nos mercados da sua região.
          </p>

          <div class="search-home">
            <input
              type="text"
              placeholder="Buscar produtos, marcas e muito mais..."
            />
            <button>Buscar</button>
          </div>

          <button id="heroCadastro">Criar Conta Gratuitamente</button>
        </div>

        <div class="hero-right">
          <img src="src/assets/images/mercado.jpg" alt="Supermercado" />
        </div>
      </div>

      <section class="categorias">
        <h2>Categorias Populares</h2>

        <div class="grid">
          <div class="categoria">
            <span>🥛 Laticínios</span>
          </div>

          <div class="categoria">
            <span>🥩 Carnes</span>
          </div>

          <div class="categoria">
            <span>🥬 Hortifruti</span>
          </div>

          <div class="categoria">
            <span>🧃 Bebidas</span>
          </div>
        </div>
      </section>
    </section>

    <!-- connect js ao html -->
    <link rel="stylesheet" href="/src/home/home.css" />
    <script type="module" src="/src/home/home.js"></script>
  </body>
</html>
