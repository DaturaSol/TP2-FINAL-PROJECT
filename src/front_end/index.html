<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartMarket</title>

    <meta name="color-scheme" content="light dark" />

    <!-- Script para carregar o tema salvo -->
    <script>
      const theme = localStorage.getItem('theme');
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>

    <!-- Ícone do site -->
    <link
      rel="icon"
      type="image/png"
      href="/src/assets/icons-supermercado-.png"
    />

    <!-- Importação dos estilos -->
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link rel="stylesheet" href="/src/home/home.css" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">
        <a href="/" class="logo-link">SmartMarket</a>
      </div>

      <div class="menu">
        <a href="/">Início</a>
        <a href="#">Categorias</a>

        <a href="/src/login/login.html" id="abrirLogin" class="btn btn-outline"
          >Entrar</a
        >
        <a
          href="/src/cadastro/cadastro.html"
          id="abrirCadastro"
          class="btn btn-primary"
          >Criar Conta</a
        >

        <button
          id="theme-toggle"
          class="theme-toggle"
          aria-label="Alternar tema claro/escuro"
        >
          🌙
        </button>
      </div>
    </nav>

    <!-- Conteúdo principal da página -->
    <main id="home">
      <section class="hero">
        <div class="hero-left">
          <span class="tag">Compare preços em segundos</span>
          <h1>Compare preços e economize em cada compra</h1>
          <p>
            Organize suas listas de compras, encontre os melhores preços e
            economize nos mercados da sua região.
          </p>

          <!-- Campo de busca -->
          <div class="search-home">
            <input
              type="text"
              placeholder="Buscar produtos, marcas e muito mais..."
              aria-label="Campo de busca de produtos e marcas"
            />
            <button type="button">Buscar</button>
          </div>

          <!-- Botão principal -->
          <button id="heroCadastro" class="btn-primary">
            Criar Conta Gratuitamente
          </button>
        </div>

        <!-- Imagem do lado direito -->
        <div class="hero-right">
          <img
            src="/src/assets/images/mercado.jpg"
            alt="Fachada de um supermercado moderno"
          />
        </div>
      </section>

      <!-- Categorias -->
      <section class="categorias">
        <h2>Categorias Populares</h2>

        <div class="grid">
          <div class="categoria">
            <span>🥛 Laticínios</span>
          </div>
          <div class="categoria">
            <span>🥩 Carnes</span>
          </div>
          <div class="categoria">
            <span>🥬 Hortifruti</span>
          </div>
          <div class="categoria">
            <span>🧃 Bebidas</span>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/home/home.js"></script>
  </body>
</html>
