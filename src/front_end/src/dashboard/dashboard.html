<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - SmartMarket</title>

    <meta name="color-scheme" content="light dark" />
    <!-- Adiciona o tema escuro se estiver ativado -->
    <script>
      const theme = localStorage.getItem('theme');
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>

    <!-- icone do site -->
    <link
      rel="icon"
      type="image/png"
      href="/src/assets/icons-supermercado-.png"
    />

    <!-- importação dos estilos -->
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link rel="stylesheet" href="/src/dashboard/dashboard.css" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">
        <a href="/" class="logo-link">SmartMarket</a>
      </div>

      <div class="menu">
        <a href="/">Início</a>
        <button id="btn-sair-nav" class="btn btn-outline">Sair</button>
      </div>
    </nav>

    <!--Dashboard-->
    <main id="dashboard">
      <header class="dashboard-top">
        <h1 id="saudacao">Olá!</h1>
        <p>Bem-vinda ao SmartMarket</p>
        <button id="btn-sair" class="btn btn-outline btn-mt">
          Sair da Conta
        </button>
      </header>

      <!--cards-->
      <section class="cards-dashboard" aria-label="Métricas da sua conta">
        <div class="dashboard-card">
          <h3>Listas</h3>
          <span>0</span>
        </div>
        <div class="dashboard-card">
          <h3>Produtos</h3>
          <span>0</span>
        </div>
        <div class="dashboard-card">
          <h3>Contribuições</h3>
          <span>0</span>
        </div>
      </section>

      <!-- Ações rápidas -->
      <section class="acoes" aria-label="Ações rápidas">
        <button class="btn btn-primary">Nova Lista</button>
        <button class="btn btn-primary">Comparar Produtos</button>
        <button class="btn btn-primary">Histórico</button>
      </section>

      <!--pesquisas-->
      <section class="dashboard-card grande">
        <h2>Últimas Pesquisas</h2>
        <p>Nenhuma pesquisa realizada.</p>
      </section>
    </main>

    <script type="module" src="/src/dashboard/dashboard.js"></script>
  </body>
</html>
