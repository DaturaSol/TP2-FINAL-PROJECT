<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SmartMarket</title>

    <meta name="color-scheme" content="light dark" />
    <!-- Adiciona o tema escuro se estiver salvo no localStorage -->
    <script>
      const theme = localStorage.getItem('theme');
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>

    <!-- icone do site -->
    <link
      rel="icon"
      type="image/png"
      href="/src/assets/icons-supermercado-.png"
    />

    <!-- importação dos estilos -->
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link rel="stylesheet" href="/src/login/login.css" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">
        <a href="/" class="logo-link">SmartMarket</a>
      </div>

      <div class="menu">
        <a href="/">Início</a>
        <a href="/">Categorias</a>
        <a href="/src/login/login.html" class="btn btn-outline">Entrar</a>
        <a href="/src/cadastro/cadastro.html" class="btn btn-primary"
          >Criar Conta</a
        >
      </div>
    </nav>

    <!-- tela de login -->
    <section id="login">
      <div class="cadastro-container">
        <div class="cadastro-banner">
          <h1>SmartMarket</h1>
          <p>Bem-vindo de volta! Acesse seus dados salvos.</p>
        </div>

        <div class="cadastro-form">
          <h2>Entrar</h2>

          <!-- Formulário de login -->
          <input
            type="email"
            id="login-email"
            placeholder="E-mail"
            aria-label="Digite seu e-mail cadastrado"
            autocomplete="email"
          />
          <p id="erro-login-email" class="mensagem-erro" role="alert"></p>

          <input
            type="password"
            id="login-senha"
            placeholder="Senha"
            aria-label="Digite sua senha"
            autocomplete="current-password"
          />
          <p id="erro-login-senha" class="mensagem-erro" role="alert"></p>

          <!-- Botão de login e msg de retorno -->
          <button id="fazerLogin">Entrar</button>
          <p id="mensagem-login" role="alert"></p>

          <p class="switch-link">
            Não tem conta?
            <a href="/src/cadastro/cadastro.html" id="link-ir-cadastro">
              Crie uma agora
            </a>
          </p>
        </div>
      </div>
    </section>

    <script type="module" src="/src/login/login.js"></script>
  </body>
</html>
